services:
  - type: web
    name: nps-bondhu-backend
    env: python
    buildCommand: pip install -r requirements.txt && python src/download_model.py
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker --timeout 300 --bind 0.0.0.0:$PORT backend.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
